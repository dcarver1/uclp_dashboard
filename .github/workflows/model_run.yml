name: Daily TOC Forecast Model Run (Distributed GAM + Intake GAM)
on:
  schedule:
    - cron: "0 10 * * *"  # UTC does not adjust for daylight saving: 3 AM MST (Nov-Mar), 4 AM MDT (Mar-Nov) — HEFS day x-1 (12Z cycle) available since ~13:40Z, SNOTEL day x-1 summary available by ~09Z; single run
  workflow_dispatch:  # Allows manual triggering for testing
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CURL_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt  

jobs:
  model-run:
    runs-on: ubuntu-latest
    steps:
      # === SETUP PHASE ===
      - name: Setup - Checkout code
        uses: actions/checkout@v4
      - name: Setup - Install R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Setup - Install Ubuntu system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudunits2-dev libgdal-dev libgeos-dev libproj-dev
      - name: Setup - Install USDA SSL certificate chain
        run: |
          echo quit | openssl s_client -showcerts -servername wcc.sc.egov.usda.gov \
            -connect wcc.sc.egov.usda.gov:443 2>/dev/null \
            | awk '/BEGIN CERTIFICATE/,/END CERTIFICATE/{print}' \
            | sudo tee /usr/local/share/ca-certificates/usda-wcc-chain.crt > /dev/null
          sudo update-ca-certificates
      - name: Setup - Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 1
          packages: |
            any::httr
            any::jsonlite
            any::tidyverse
            any::arrow
            any::mgcv
            any::snotelr
      # === MODEL RUN PHASE ===
      - name: Run Models
        working-directory: ./
        run: Rscript gha_scripts/model_run_workflow.R
      # === SAVE PHASE ===
      - name: Save - Commit and push results
        run: |
          git config --global user.email 'actions@github.com'
          git config --global user.name 'GitHub Actions'
          git add -f data/toc_forecast_distributed_backup.parquet data/toc_forecast_intake_backup.parquet
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily forecast update: $(date -u +%Y-%m-%d_%H:%M:%S_UTC)"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
            echo "Forecast data successfully updated and pushed"
          fi
