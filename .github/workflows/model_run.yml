name: Daily TOC Forecast Model Run (Distributed GAM + Intake GAM)
on:
  schedule:
    - cron: "0 14 * * *"  # 8 AM MDT — early/opportunistic HEFS check
    - cron: "0 21 * * *"  # 3 PM MDT — primary pull, post-CBRFC run (~2 PM MDT)
  workflow_dispatch:  # Allows manual triggering for testing
jobs:
  model-run:
    runs-on: ubuntu-latest
    steps:
      # === SETUP PHASE ===
      - name: Setup - Checkout code
        uses: actions/checkout@v4
      - name: Setup - Install R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Setup - Install Ubuntu system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudunits2-dev libgdal-dev libgeos-dev libproj-dev
      - name: Setup - Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 1
          packages: |
            any::httr
            any::jsonlite
            any::tidyverse
            any::arrow
            any::mgcv
            any::snotelr
      # === MODEL RUN PHASE ===
      - name: Run Models
        working-directory: ./
        run: Rscript R/model_run_workflow.R
      # === SAVE PHASE ===
      - name: Save - Commit and push results
        run: |
          git config --global user.email 'actions@github.com'
          git config --global user.name 'GitHub Actions'
          git add -f data/toc_forecast_backup.parquet
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily forecast update: $(date -u +%Y-%m-%d_%H:%M:%S_UTC)"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
            echo "Forecast data successfully updated and pushed"
          fi
